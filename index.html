<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ベッドコントロールシステム Ver.0.8</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#1f2937;--muted:#667085;--line:#d5deea;--accent:#1769aa;--occ:#ef7070;--stop:#8d99a6;--reserve:#f2c94c}
*{box-sizing:border-box}body{margin:0;font-family:"Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--text)}
header{background:#fff;border-bottom:1px solid var(--line);padding:16px 22px;position:sticky;top:0;z-index:5}h1{margin:0;font-size:23px}header p{margin:4px 0 0;color:var(--muted);font-size:13px}
main{max-width:1400px;margin:18px auto;padding:0 16px 40px}.notice,.card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:14px}.notice{background:#fff7df;border-color:#e8ce93}
.tabs,.subtabs,.actions{display:flex;gap:8px;flex-wrap:wrap}.tabs{margin-bottom:14px}.tab,.ward-tab,.btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 13px;font-weight:800;cursor:pointer}.active,.btn-primary{background:var(--accent)!important;color:#fff;border-color:var(--accent)!important}
.panel{display:none}.panel.active{display:block}h2{margin:0 0 8px;font-size:20px}h3{margin:0 0 7px}.summary{color:var(--muted);font-size:13px}
.toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:12px 0}.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:13px}.legend span{display:flex;gap:5px;align-items:center}.dot{width:16px;height:16px;border:1px solid #9ca8b7;border-radius:4px}.vacant{background:#fff}.occupied{background:var(--occ)!important}.stopped{background:var(--stop)!important;color:#fff}.reserved{background:var(--reserve)!important}
.stats{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:9px;margin:12px 0}.metric{background:#fbfdff;border:1px solid var(--line);border-radius:10px;padding:10px}.metric strong{display:block;font-size:21px;margin-top:3px}.progress{height:11px;background:#e5ecf3;border-radius:999px;overflow:hidden;margin-top:6px}.progress div{height:100%}.low{background:#238a8d}.mid{background:#d49b22}.high{background:#c84b3a}
.ward-map{background:#fffef0;border:1px solid #e1dab4;border-radius:12px;padding:14px;min-height:430px}.room-grid{display:grid;grid-template-columns:repeat(7,minmax(110px,1fr));gap:10px}.room{border:2px solid #aeb9c7;border-radius:8px;background:#fff;overflow:hidden}.room-head{text-align:center;font-weight:900;padding:5px;background:#dbeefa;border-bottom:1px solid #aeb9c7}.room-type{text-align:center;font-size:11px;color:#536174;padding:3px;background:#f7f9fc}.beds{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;padding:7px}.beds.one{grid-template-columns:1fr}.bed{min-height:40px;border:1px solid #98a5b5;border-radius:6px;background:#fff;font-weight:900;cursor:pointer}.recommended{outline:4px solid #1769aa;animation:pulse 1s infinite}@keyframes pulse{50%{outline-color:#8ec9f2}}
.grid{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:10px}label{display:block;font-size:13px;font-weight:800;margin-bottom:5px}input,select,textarea{width:100%;border:1px solid #c7d1de;border-radius:8px;padding:9px;font:inherit;background:#fff}.patient-tabs{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}.patient-tab{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px;font-weight:800;cursor:pointer}.patient-form{display:none;border-top:1px solid var(--line);padding-top:14px}.patient-form.active{display:block}.result{border-left:6px solid var(--accent);background:#fff;border-radius:10px;padding:13px;margin-top:10px;box-shadow:0 1px 4px #0001}.result h3{display:flex;justify-content:space-between}.tag{display:inline-block;padding:4px 8px;border-radius:999px;background:#e7f2fb;color:#145b92;font-size:12px;font-weight:800;margin:3px}.empty{padding:20px;text-align:center;color:var(--muted);border:1px dashed #aeb9c7;border-radius:10px}.history{border:1px solid var(--line);border-radius:10px;padding:11px;margin-bottom:8px}.time{font-size:12px;color:var(--muted)}
@media(max-width:1050px){.room-grid{grid-template-columns:repeat(5,minmax(100px,1fr))}}@media(max-width:760px){.room-grid{grid-template-columns:repeat(3,minmax(92px,1fr))}.grid{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:repeat(2,1fr)}}@media(max-width:470px){.room-grid{grid-template-columns:repeat(2,minmax(88px,1fr))}.grid{grid-template-columns:1fr}header{position:static}}
</style></head><body>
<header><h1>小田原市立総合医療センター　ベッドコントロールシステム</h1><p>試作版 Ver.0.8｜病棟マップ方式</p></header><main>
<div class="notice"><strong>注意：</strong>テスト用です。実在する患者情報は入力しないでください。男女別病室区分は未設定です。</div>
<div class="tabs"><button class="tab active" data-tab="maps">① 朝の病床マップ</button><button class="tab" data-tab="admission">② 緊急入院判定</button><button class="tab" data-tab="overview">③ 病床一覧</button><button class="tab" data-tab="history">④ 調整履歴</button></div>

<section id="maps" class="panel active"><div class="card"><h2>朝の病床状況入力</h2><p class="summary">病床をタップすると使用中（赤）と空床（白）が切り替わります。利用停止モードではグレーにできます。</p>
<div id="wardTabs" class="subtabs" style="margin-top:12px"></div>
<div class="toolbar"><div class="legend"><span><i class="dot vacant"></i>空床</span><span><i class="dot occupied"></i>使用中</span><span><i class="dot stopped"></i>利用停止</span><span><i class="dot reserved"></i>受入予定</span></div>
<div class="actions"><label style="display:flex;gap:6px;align-items:center;margin:0"><input id="stopMode" type="checkbox" style="width:auto">利用停止モード</label><button class="btn" id="allOccupied">全床使用中</button><button class="btn" id="allVacant">全床空床</button></div></div>
<div id="stats" class="stats"></div><div id="wardMap" class="ward-map"></div>
<div class="actions" style="margin-top:13px"><button class="btn btn-primary" id="saveMorning">朝の状態として保存</button><button class="btn" id="resetAll">全データ初期化</button></div></div></section>

<section id="admission" class="panel"><div class="card"><h2>緊急入院患者入力</h2><p class="summary">診療科と病室タイプから、具体的な空床を第1～第3候補まで表示します。</p><div id="patientTabs" class="patient-tabs"></div><div id="patientForms"></div></div></section>
<section id="overview" class="panel"><div class="card"><h2>現在の病床一覧</h2><div id="overviewTable"></div></div></section>
<section id="history" class="panel"><div class="card"><div class="toolbar"><div><h2>調整履歴</h2><p class="summary">病床変更と受入確定の履歴です。</p></div><div class="actions"><button class="btn" id="undoLatest">直前を取り消す</button><button class="btn" id="restoreMorning">朝の状態に戻す</button></div></div><div id="historyList"></div></div></section>
</main><script>
const C={"roomType": {"652": "general", "653": "general", "656": "general", "659": "general", "660": "general", "664": "general", "667": "general", "753": "general", "754": "general", "757": "general", "760": "general", "761": "general", "765": "general", "768": "general", "704": "general", "703": "general", "702": "general", "701": "general", "707": "general", "708": "general", "709": "general", "853": "general", "854": "general", "857": "general", "860": "general", "861": "general", "865": "general", "868": "general", "805": "general", "804": "general", "801": "general", "810": "general", "815": "general", "816": "general", "953": "general", "954": "general", "957": "general", "960": "general", "961": "general", "965": "general", "968": "general", "910": "general", "905": "general", "904": "general", "901": "general", "915": "general", "916": "general", "658": "special4", "759": "special4", "710": "special4", "859": "special4", "811": "special4", "812": "special4", "959": "special4", "911": "special4", "912": "special4", "651": "B", "654": "B", "655": "B", "662": "B", "665": "B", "666": "B", "668": "B", "669": "B", "751": "B", "752": "B", "755": "B", "756": "B", "763": "B", "766": "B", "767": "B", "769": "B", "770": "B", "705": "B", "712": "B", "713": "B", "714": "B", "717": "B", "851": "B", "852": "B", "855": "B", "856": "B", "870": "B", "869": "B", "867": "B", "866": "B", "863": "B", "808": "B", "806": "B", "803": "B", "802": "B", "814": "B", "817": "B", "818": "B", "970": "B", "969": "B", "967": "B", "966": "B", "963": "B", "956": "B", "955": "B", "952": "B", "951": "B", "902": "B", "903": "B", "906": "B", "908": "B", "914": "B", "917": "B", "918": "B", "657": "A", "663": "A", "758": "A", "764": "A", "706": "A", "711": "A", "858": "A", "864": "A", "807": "A", "813": "A", "958": "A", "964": "A", "907": "A", "913": "A", "661": "severe", "762": "severe", "716": "severe", "862": "severe", "809": "severe", "962": "severe", "909": "severe", "919": "severe", "819": "severe", "719": "severe", "718": "severe"}, "layouts": {"6E": ["663", "662", "661", "660", "659", "658", "657", "656", "655", "654", "653", "652", "651", "664", "665", "666", "667", "668", "669"], "7E": ["764", "763", "762", "761", "760", "759", "758", "757", "756", "755", "754", "753", "752", "751", "765", "766", "767", "768", "769", "770"], "7W": ["705", "706", "707", "708", "709", "710", "711", "712", "713", "714", "716", "717", "718", "719", "704", "703", "702", "701"], "8E": ["864", "863", "862", "861", "860", "859", "858", "857", "856", "855", "854", "853", "852", "851", "865", "866", "867", "868", "869", "870"], "8W": ["806", "807", "808", "809", "810", "811", "812", "813", "814", "815", "816", "817", "818", "819", "805", "804", "803", "802", "801"], "9E": ["964", "963", "962", "961", "960", "959", "958", "957", "956", "955", "954", "953", "952", "951", "965", "966", "967", "968", "969", "970"], "9W": ["906", "907", "908", "909", "910", "911", "912", "913", "914", "915", "916", "917", "918", "919", "905", "904", "903", "902", "901"]}, "wardMaster": {"6E": ["救急科", "形成外科", "皮膚科", "眼科", "糖尿病内科"], "7E": ["整形外科"], "7W": ["耳鼻咽喉科", "呼吸器外科", "呼吸器内科", "感染症科"], "8E": ["消化器内科", "泌尿器科"], "8W": ["外科"], "9E": ["循環器内科", "心臓血管外科"], "9W": ["脳神経外科", "脳神経内科"]}}, labels={general:"大部屋",special4:"特別4床室",B:"特別室B",A:"特別室A",severe:"重症個室"}, bedsPer={general:4,special4:4,B:1,A:1,severe:1}, critical={"3D":20,"3HCU":16,"3ICU":12};
const depts=[...new Set(Object.values(C.wardMaster).flat())].sort((a,b)=>a.localeCompare(b,"ja"));let ward="6E",history=JSON.parse(localStorage.getItem("v08h")||"[]"),morning=JSON.parse(localStorage.getItem("v08m")||"null"),state=JSON.parse(localStorage.getItem("v08s")||"null");
function fresh(){let s={rooms:{},critical:{}};for(const[w,rs]of Object.entries(C.layouts)){s.rooms[w]={};for(const r of rs){let t=C.roomType[r];s.rooms[w][r]=Array.from({length:bedsPer[t]},(_,i)=>({id:`${r}-${i+1}`,status:"occupied"}))}}for(const[u,n]of Object.entries(critical))s.critical[u]=Array.from({length:n},(_,i)=>({id:`${u}-${i+1}`,status:"occupied"}));return s}if(!state)state=fresh();
const clone=x=>JSON.parse(JSON.stringify(x));function save(){localStorage.setItem("v08s",JSON.stringify(state));localStorage.setItem("v08h",JSON.stringify(history))}
function list(w){return critical[w]?state.critical[w]:Object.values(state.rooms[w]||{}).flat()}function count(w){let a=list(w),usable=a.filter(x=>x.status!="stopped").length,occ=a.filter(x=>["occupied","reserved"].includes(x.status)).length,vac=a.filter(x=>x.status=="vacant").length,stop=a.filter(x=>x.status=="stopped").length;return{usable,occ,vac,stop,rate:usable?Math.round(occ/usable*100):0}}
function today(w){let d=new Date().toDateString();return history.filter(x=>x.kind=="accept"&&x.ward==w&&new Date(x.time).toDateString()==d).length}function rc(r){return r>=90?"high":r>=80?"mid":"low"}
function log(item,before){history.unshift({time:new Date().toISOString(),before,...item});save();renderHistory()}
function renderTabs(){let ws=["6E","7E","7W","8E","8W","9E","9W","3D","3HCU","3ICU"];wardTabs.innerHTML=ws.map(w=>`<button class="ward-tab ${w==ward?"active":""}" data-w="${w}">${w}</button>`).join("");document.querySelectorAll("[data-w]").forEach(b=>b.onclick=()=>{ward=b.dataset.w;renderTabs();renderMap()})}
function renderMap(){let c=count(ward);stats.innerHTML=`<div class="metric">使用中<strong>${c.occ}/${c.usable}床</strong></div><div class="metric">空床<strong>${c.vac}床</strong></div><div class="metric">利用停止<strong>${c.stop}床</strong></div><div class="metric">稼働率<strong>${c.rate}%</strong><div class="progress"><div class="${rc(c.rate)}" style="width:${c.rate}%"></div></div></div>`;
if(critical[ward])wardMap.innerHTML=`<h3>${ward}</h3><div class="room-grid">${state.critical[ward].map(b=>`<div class="room"><div class="room-head">${b.id}</div><div class="beds one"><button class="bed ${b.status}" data-bed="${b.id}" data-room="critical">1</button></div></div>`).join("")}</div>`;
else wardMap.innerHTML=`<h3>${ward}病棟</h3><div class="room-grid">${C.layouts[ward].map(r=>{let t=C.roomType[r],bs=state.rooms[ward][r];return`<div class="room"><div class="room-head">${r}</div><div class="room-type">${labels[t]}</div><div class="beds ${bs.length==1?"one":""}">${bs.map(b=>`<button class="bed ${b.status}" data-bed="${b.id}" data-room="${r}">${b.id.split("-").pop()}</button>`).join("")}</div></div>`}).join("")}</div>`;
wardMap.querySelectorAll(".bed").forEach(b=>b.onclick=()=>toggle(b.dataset.room,b.dataset.bed))}
function toggle(room,id){let before=clone(state),b=critical[ward]?state.critical[ward].find(x=>x.id==id):state.rooms[ward][room].find(x=>x.id==id);b.status=stopMode.checked?(b.status=="stopped"?"occupied":"stopped"):(b.status=="occupied"?"vacant":"occupied");log({kind:"manual",ward,label:`${ward} ${id}を${b.status=="vacant"?"空床":b.status=="occupied"?"使用中":"利用停止"}に変更`},before);renderMap();renderOverview()}
function setAll(s){let before=clone(state);list(ward).forEach(b=>b.status=s);log({kind:"manual",ward,label:`${ward}を一括変更`},before);renderMap();renderOverview()}
function vacancies(w,t){let a=[];for(const[r,bs]of Object.entries(state.rooms[w]||{}))if(C.roomType[r]==t)bs.filter(b=>b.status=="vacant").forEach(b=>a.push({ward:w,room:r,bed:b.id,type:t}));return a}
function field(i,n){return document.getElementById(`p${i}-${n}`)}function info(i){return{name:field(i,"name").value||`患者${i+1}`,dept:field(i,"dept").value,type:field(i,"type").value}}
function judge(i){let p=info(i),root=field(i,"results");if(p.type=="critical"){root.innerHTML=`<div class="result"><h3><span>対応先</span><span>3D病棟師長へ連絡</span></h3></div>`;return}let cs=[];if(p.type=="3D")cs=state.critical["3D"].filter(b=>b.status=="vacant").map(b=>({ward:"3D",room:"critical",bed:b.id,type:"3D",primary:true}));else for(const[w,ds]of Object.entries(C.wardMaster))vacancies(w,p.type).forEach(x=>cs.push({...x,primary:ds.includes(p.dept)}));cs.sort((a,b)=>Number(b.primary)-Number(a.primary)||count(b.ward).vac-count(a.ward).vac);cs=cs.slice(0,3);root.innerHTML=cs.length?cs.map((x,n)=>`<div class="result"><h3><span>第${n+1}候補</span><span>${x.ward} ${x.bed}</span></h3><span class="tag">${labels[x.type]||x.type}</span>${x.primary?'<span class="tag">主病棟</span>':'<span class="tag">代替病棟</span>'}<div class="actions"><button class="btn" data-show="${x.ward}|${x.bed}">マップで確認</button><button class="btn btn-primary" data-ok="${i}|${x.ward}|${x.room}|${x.bed}">受入確定</button></div></div>`).join(""):`<div class="empty">条件に合う空床がありません。</div>`;bind()}
function bind(){document.querySelectorAll("[data-show]").forEach(b=>b.onclick=()=>show(...b.dataset.show.split("|")));document.querySelectorAll("[data-ok]").forEach(b=>b.onclick=()=>confirmBed(...b.dataset.ok.split("|")))}
function show(w,id){ward=w;document.querySelector('[data-tab="maps"]').click();renderTabs();renderMap();setTimeout(()=>{let e=[...document.querySelectorAll(".bed")].find(x=>x.dataset.bed==id);if(e){e.classList.add("recommended");e.scrollIntoView({behavior:"smooth",block:"center"})}},50)}
function confirmBed(i,w,r,id){let before=clone(state),b=critical[w]?state.critical[w].find(x=>x.id==id):state.rooms[w][r].find(x=>x.id==id);if(!b||b.status!="vacant"){alert("空床ではありません");return}b.status="occupied";let p=info(Number(i));log({kind:"accept",ward:w,label:`${p.name}を${w} ${id}で受入確定`},before);field(i,"results").innerHTML=`<div class="result"><h3><span>調整確定</span><span>${w} ${id}</span></h3></div>`;renderOverview()}
function renderOverview(){let ws=["6E","7E","7W","8E","8W","9E","9W","3D","3HCU","3ICU"];overviewTable.innerHTML=ws.map(w=>{let c=count(w);return`<div class="card"><div class="toolbar"><div><h3>${w}</h3><div class="summary">空床 ${c.vac}床｜利用停止 ${c.stop}床｜本日の受入 <strong>${today(w)}件</strong></div></div><div style="min-width:245px"><strong>${c.occ}/${c.usable}床使用中（稼働率：${c.rate}%）</strong><div class="progress"><div class="${rc(c.rate)}" style="width:${c.rate}%"></div></div></div></div></div>`}).join("")}
function renderHistory(){historyList.innerHTML=history.length?history.map((h,i)=>`<div class="history"><strong>${h.label}</strong><div class="time">${new Date(h.time).toLocaleString("ja-JP")}</div><button class="btn" data-r="${i}" style="margin-top:7px">この変更前に戻す</button></div>`).join(""):`<div class="empty">履歴はありません。</div>`;document.querySelectorAll("[data-r]").forEach(b=>b.onclick=()=>restore(Number(b.dataset.r)))}
function restore(i){if(!confirm("この変更前に戻しますか？"))return;state=clone(history[i].before);history=history.slice(i+1);save();renderMap();renderOverview();renderHistory()}
function renderPatients(){patientTabs.innerHTML=Array.from({length:10},(_,i)=>`<button class="patient-tab ${i==0?"active":""}" data-p="${i}">患者${i+1}</button>`).join("");patientForms.innerHTML=Array.from({length:10},(_,i)=>`<div class="patient-form ${i==0?"active":""}"><h3>緊急患者 ${i+1}</h3><div class="grid"><div><label>患者氏名（テスト用）</label><input id="p${i}-name"></div><div><label>診療科</label><select id="p${i}-dept">${depts.map(d=>`<option>${d}</option>`).join("")}</select></div><div><label>性別</label><select><option>男性</option><option>女性</option></select></div><div><label>必要病床</label><select id="p${i}-type"><option value="general">大部屋</option><option value="special4">特別4床室</option><option value="B">特別室B</option><option value="A">特別室A</option><option value="severe">重症個室</option><option value="3D">3D</option><option value="critical">HCU・ICU</option></select></div></div><div class="actions" style="margin-top:11px"><button class="btn btn-primary" data-j="${i}">第1～第3候補を表示</button></div><div id="p${i}-results"></div></div>`).join("");document.querySelectorAll("[data-p]").forEach(b=>b.onclick=()=>{document.querySelectorAll(".patient-tab").forEach(x=>x.classList.toggle("active",x==b));document.querySelectorAll(".patient-form").forEach((x,j)=>x.classList.toggle("active",j==Number(b.dataset.p)))});document.querySelectorAll("[data-j]").forEach(b=>b.onclick=()=>judge(Number(b.dataset.j)))}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));b.classList.add("active");document.getElementById(b.dataset.tab).classList.add("active");if(b.dataset.tab=="overview")renderOverview();if(b.dataset.tab=="history")renderHistory()});
allOccupied.onclick=()=>setAll("occupied");allVacant.onclick=()=>setAll("vacant");saveMorning.onclick=()=>{morning={state:clone(state),time:new Date().toISOString()};history=[];save();localStorage.setItem("v08m",JSON.stringify(morning));renderHistory();alert("朝の状態を保存しました")};undoLatest.onclick=()=>history.length?restore(0):alert("履歴がありません");restoreMorning.onclick=()=>{if(!morning)return alert("朝の状態がありません");if(confirm("朝の状態に戻しますか？")){state=clone(morning.state);history=[];save();renderMap();renderOverview();renderHistory()}};resetAll.onclick=()=>{if(confirm("全データを初期化しますか？")){state=fresh();history=[];morning=null;localStorage.clear();save();renderMap();renderOverview();renderHistory()}};
renderTabs();renderMap();renderPatients();renderOverview();renderHistory();
</script></body></html>
